name: CI/CD Pipeline - saludo-service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE_NAME: saludo-service
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

# ============================================================
# FASE 1: Quality Gates (seguridad, calidad, cumplimiento)
# ============================================================
jobs:
  security-scan:
    name: " Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      - uses: snyk/actions/setup@master
      - run: snyk test --severity-threshold=high --all-projects || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  quality-check:
    name: " Quality Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      - run: mvn clean verify sonar:sonar \
          -Dsonar.projectKey=TU_PROJECT_KEY \
          -Dsonar.organization=TU_ORG \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  test-coverage:
    name: " Test Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      - run: mvn clean verify -B
      - uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  compliance-check:
    name: " Compliance Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if [ ! -f "README.md" ]; then
            echo "::error::Missing README.md"
            exit 1
          fi
          if [ -f "Dockerfile" ]; then
            echo "✓ Dockerfile exists"
          fi

# ============================================================
# FASE 2: Build
# ============================================================
  build:
    name: " Build & Push a ECR"
    needs: [security-scan, quality-check, test-coverage, compliance-check]
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
      image-tag: ${{ steps.build.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - id: build
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_URI="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          IMAGE_URI_LATEST="${REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"
          
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image-uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          
          docker build \
            -t ${IMAGE_URI} \
            -t ${IMAGE_URI_LATEST} .
          
          docker push ${IMAGE_URI}
          docker push ${IMAGE_URI_LATEST}
          
          echo "✓ Image built and pushed successfully"
          echo "  Tag: ${IMAGE_TAG}"
          echo "  URI: ${IMAGE_URI}"

# ============================================================
# FASE 2.5: Acceptance Tests
# ============================================================
  acceptance-tests:
    name: " Acceptance Tests"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_URI="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          
          echo "Testing image: ${IMAGE_URI}"
          echo "Pulling and running container..."
          
          docker run --rm -p 8080:8080 \
            ${IMAGE_URI} &
          
          CONTAINER_PID=$!
          sleep 15
          
          echo "Testing endpoints..."
          curl -v http://localhost:8080/saludo || exit 1
          echo "✓ /saludo endpoint OK"
          
          curl -v http://localhost:8080/info || exit 1
          echo "✓ /info endpoint OK"
          
          curl -v http://localhost:8080/livez || exit 1
          echo "✓ /livez endpoint OK"
          
          curl -v http://localhost:8080/readyz || exit 1
          echo "✓ /readyz endpoint OK"
          
          kill $CONTAINER_PID || true
          echo "✓ All acceptance tests passed!"

# ============================================================
# FASE 3: Deploy
# ============================================================
  deploy:
    name: " Deploy a EKS"
    needs: [acceptance-tests, build]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0
      
      - run: |
          echo "Configuring kubectl..."
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name "$CLUSTER_NAME"
          echo "✓ kubectl configured"
      
      - run: |
          echo "Creating namespace and applying manifests..."
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml -n saludo
          kubectl apply -f k8s/service.yaml -n saludo
          kubectl apply -f k8s/hpa.yaml -n saludo
          echo "✓ All manifests applied"
      
      - run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_URI="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          
          echo "Updating deployment with image: ${IMAGE_URI}"
          kubectl set image deployment/saludo-service \
            saludo-service=${IMAGE_URI} \
            -n saludo
          
          echo "✓ Deployment updated"
          
          echo "Waiting for rollout..."
          kubectl rollout status deployment/saludo-service -n saludo --timeout=5m
          echo "✓ Rollout successful"
          
          echo ""
          echo "Deployment Summary:"
          kubectl get deployment saludo-service -n saludo
          kubectl get pods -l app=saludo-service -n saludo