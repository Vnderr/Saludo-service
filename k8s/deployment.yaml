apiVersion: apps/v1
kind: Deployment
metadata:
  name: saludo-service
  namespace: saludo
  labels:
    app: saludo-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saludo-service
  template:
    metadata:
      labels:
        app: saludo-service
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: saludo-service
      containers:
        - name: saludo-service
          image: saludo-service:latest  
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080  
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3