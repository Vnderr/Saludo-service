services:
  saludo-app:
    image: 603709501479.dkr.ecr.us-east-1.amazonaws.com/saludo-service
    container_name: saludo-service-container
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "awslogs"
      options:
        awslogs-region: "us-east-1"
        awslogs-group: "saludo-service-logs"
        awslogs-create-group: "true"
